name: harmony-platform

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: harmony
      POSTGRES_USER: harmony
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?}"
    volumes: [postgres:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U harmony -d harmony"]
      interval: 5s
      timeout: 3s
      retries: 20

  cloud-db-init:
    image: postgres:17-alpine
    environment:
      PGPASSWORD: "${POSTGRES_PASSWORD:?}"
    command:
      - sh
      - -ec
      - |
        present="$$(psql -h postgres -U harmony -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='harmony_cloud'")"
        if [ "$$present" != "1" ]; then
          psql -h postgres -U harmony -d postgres -c "CREATE DATABASE harmony_cloud"
        fi
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:?}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:?}"
    volumes: [minio:/data]
    healthcheck:
      test: [CMD, curl, -f, http://localhost:9000/minio/health/live]
      interval: 5s
      timeout: 3s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    volumes: [valkey:/data]
    healthcheck:
      test: [CMD, valkey-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: harmony
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:?}"
    volumes:
      - rabbitmq:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - /etc/harmony-platform/rabbitmq-certs:/certs:ro
    ports: ["5671:5671"]
    healthcheck:
      test: [CMD, rabbitmq-diagnostics, -q, ping]
      interval: 10s
      timeout: 5s
      retries: 20

  resolver-migrate:
    image: "${RESOLVER_IMAGE:-ghcr.io/bozmund/harmony-resolver-api:latest}"
    environment:
      RUN_MIGRATIONS: "true"
      ConnectionStrings__PostgreSql: "Host=postgres;Database=harmony;Username=harmony;Password=${POSTGRES_PASSWORD:?}"
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  resolver-api-1: &resolver-api
    image: "${RESOLVER_IMAGE:-ghcr.io/bozmund/harmony-resolver-api:latest}"
    environment: &resolver-environment
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PostgreSql: "Host=postgres;Database=harmony;Username=harmony;Password=${POSTGRES_PASSWORD:?}"
      ConnectionStrings__Valkey: valkey:6379
      ObjectStorage__Endpoint: http://minio:9000
      ObjectStorage__AccessKey: "${MINIO_ROOT_USER:?}"
      ObjectStorage__SecretKey: "${MINIO_ROOT_PASSWORD:?}"
      ObjectStorage__Bucket: harmony-audio
      Quotas__IdentityHmacKey: "${IDENTITY_HMAC_KEY:?}"
      Auth0__Domain: "${AUTH0_DOMAIN:?}"
      Auth0__Audience: https://harmony-resolver
      Resolver__ExtractionMode: Delegated
      Resolver__MaxDurationMinutes: "9"
      Resolver__MaxMediaGiB: "50"
      Resolver__PrefetchStopGiB: "45"
      Resolver__BackupStopGiB: "48"
      RabbitMq__Uri: "amqp://harmony:${RABBITMQ_PASSWORD:?}@rabbitmq:5672"
    depends_on:
      resolver-migrate: { condition: service_completed_successfully }
      minio: { condition: service_healthy }
      valkey: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    restart: unless-stopped

  resolver-api-2:
    <<: *resolver-api
    environment: *resolver-environment

  cloud-migrate:
    image: "${CLOUD_IMAGE:-ghcr.io/bozmund/harmony-cloud-api:latest}"
    environment:
      RUN_MIGRATIONS: "true"
      Cloud__IdentityHmacKey: "${CLOUD_IDENTITY_HMAC_KEY:?}"
      Cloud__ResolverBaseUrl: http://resolver-api-1:8080/
      Cloud__Auth0Domain: "${AUTH0_DOMAIN:?}"
      Cloud__Auth0ClientId: "${CLOUD_AUTH0_CLIENT_ID:?}"
      Cloud__Auth0ClientSecret: "${CLOUD_AUTH0_CLIENT_SECRET:?}"
      Cloud__Auth0Audience: https://harmony-resolver
      ConnectionStrings__PostgreSql: "Host=postgres;Database=harmony_cloud;Username=harmony;Password=${POSTGRES_PASSWORD:?}"
    depends_on:
      cloud-db-init: { condition: service_completed_successfully }
    restart: "no"

  cloud-api:
    image: "${CLOUD_IMAGE:-ghcr.io/bozmund/harmony-cloud-api:latest}"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: Production
      Cloud__IdentityHmacKey: "${CLOUD_IDENTITY_HMAC_KEY:?}"
      Cloud__ResolverBaseUrl: http://resolver-api-1:8080/
      Cloud__Auth0Domain: "${AUTH0_DOMAIN:?}"
      Cloud__Auth0ClientId: "${CLOUD_AUTH0_CLIENT_ID:?}"
      Cloud__Auth0ClientSecret: "${CLOUD_AUTH0_CLIENT_SECRET:?}"
      Cloud__Auth0Audience: https://harmony-resolver
      Auth0__Domain: "${AUTH0_DOMAIN:?}"
      Auth0__Audience: https://harmony-resolver
      ConnectionStrings__PostgreSql: "Host=postgres;Database=harmony_cloud;Username=harmony;Password=${POSTGRES_PASSWORD:?}"
    depends_on:
      cloud-migrate: { condition: service_completed_successfully }
      resolver-api-1: { condition: service_started }
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes: ["./nginx.conf:/etc/nginx/nginx.conf:ro"]
    depends_on: [resolver-api-1, resolver-api-2, cloud-api]
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [nginx]
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.4.0
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=15d"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.0
    command: -config.file=/etc/loki/harmony.yml
    volumes:
      - ./observability/loki.yml:/etc/loki/harmony.yml:ro
      - loki:/loki
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.8.3
    command: run /etc/alloy/config.alloy
    volumes:
      - ./observability/alloy.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on: [loki]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.0.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?}"
    volumes:
      - grafana:/var/lib/grafana
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/harmony.yml:ro
    depends_on: [prometheus, loki]
    restart: unless-stopped

volumes:
  postgres: { name: harmony-resolver_postgres }
  minio: { name: harmony-resolver_minio }
  valkey: { name: harmony-resolver_valkey }
  rabbitmq: { name: harmony-resolver_rabbitmq }
  caddy_data: { name: harmony-platform_caddy_data }
  caddy_config: { name: harmony-platform_caddy_config }
  prometheus: { name: harmony-resolver_prometheus }
  loki: { name: harmony-resolver_loki }
  grafana: { name: harmony-resolver_grafana }
