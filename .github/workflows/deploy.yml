name: deploy platform
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      resolver_image:
        description: Resolver image tag
        required: false
      cloud_image:
        description: Cloud image tag
        required: false
  repository_dispatch:
    types: [resolver-published, cloud-published]
permissions:
  contents: read
concurrency:
  group: harmony-production
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Update harmony-resolver DNS
        env:
          DUCKDNS_TOKEN: ${{ secrets.DUCKDNS_TOKEN }}
          VPS_IPV4: ${{ secrets.VPS_IPV4 }}
        run: |
          set -euo pipefail
          result="$(curl --fail --silent --show-error --get \
            --data-urlencode domains=harmony-resolver \
            --data-urlencode token="$DUCKDNS_TOKEN" \
            --data-urlencode ip="$VPS_IPV4" \
            https://www.duckdns.org/update)"
          test "$result" = "OK"
      - uses: appleboy/ssh-action@v1
        env:
          RESOLVER_IMAGE: ${{ inputs.resolver_image || github.event.client_payload.resolver_image || 'ghcr.io/bozmund/harmony-resolver-api:latest' }}
          CLOUD_IMAGE: ${{ inputs.cloud_image || github.event.client_payload.cloud_image || 'ghcr.io/bozmund/harmony-cloud-api:latest' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: RESOLVER_IMAGE,CLOUD_IMAGE
          script: |
            set -euo pipefail
            test -x /usr/local/sbin/harmony-platform-deploy
            sudo /usr/local/sbin/harmony-platform-deploy \
              "$RESOLVER_IMAGE" "$CLOUD_IMAGE"
