global: { scrape_interval: 15s }
scrape_configs:
  - job_name: harmony-resolver
    metrics_path: /metrics
    static_configs:
      - targets: ["resolver-api-1:8080", "resolver-api-2:8080"]
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
